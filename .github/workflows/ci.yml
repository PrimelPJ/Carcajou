name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests scripts
      - name: Test
        run: pytest -q --cov=carcajou --cov-report=term-missing

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,plots]"
      # Short run so a regression in the filter fails the build, not just the tests.
      - run: python scripts/run_benchmark.py --laps 2 --seeds 1 --imu industrial-mems --no-plots
